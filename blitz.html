<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>BLITZ — Dodge or Die</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --cyan: #00f5ff;
    --red: #ff2244;
    --yellow: #ffdd00;
    --bg: #050508;
    --grid: rgba(0,245,255,0.04);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    overflow: hidden;
    font-family: 'Orbitron', monospace;
    color: var(--cyan);
  }

  #canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }

  /* Grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--grid) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Scanlines */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      to bottom,
      transparent 0px,
      transparent 3px,
      rgba(0,0,0,0.15) 3px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 10;
  }

  #ui {
    position: fixed;
    top: 0; left: 0; right: 0;
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    padding: 18px 24px;
    z-index: 5;
    pointer-events: none;
  }

  .stat-block { display: flex; flex-direction: column; gap: 2px; }
  .stat-label { font-size: 9px; letter-spacing: 3px; opacity: 0.5; font-family: 'Share Tech Mono', monospace; }
  .stat-value { font-size: 22px; font-weight: 900; letter-spacing: 2px; text-shadow: 0 0 20px currentColor; }
  .stat-value.cyan { color: var(--cyan); }
  .stat-value.yellow { color: var(--yellow); }

  #lives-display {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .heart {
    width: 14px; height: 14px;
    background: var(--red);
    clip-path: polygon(50% 100%, 0% 35%, 25% 0%, 50% 20%, 75% 0%, 100% 35%);
    box-shadow: 0 0 10px var(--red);
    transition: all 0.2s;
  }
  .heart.dead {
    background: #333;
    box-shadow: none;
    opacity: 0.3;
  }

  /* OVERLAY */
  #overlay {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 20;
    background: radial-gradient(ellipse at center, rgba(5,5,8,0.85) 0%, rgba(5,5,8,0.98) 100%);
    transition: opacity 0.4s;
  }
  #overlay.hidden { opacity: 0; pointer-events: none; }

  .title-big {
    font-size: clamp(52px, 12vw, 100px);
    font-weight: 900;
    letter-spacing: 8px;
    color: var(--cyan);
    text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,245,255,0.3);
    line-height: 1;
    animation: pulse-text 2s ease-in-out infinite;
  }

  @keyframes pulse-text {
    0%, 100% { text-shadow: 0 0 40px var(--cyan), 0 0 80px rgba(0,245,255,0.3); }
    50% { text-shadow: 0 0 60px var(--cyan), 0 0 120px rgba(0,245,255,0.5), 0 0 200px rgba(0,245,255,0.2); }
  }

  .subtitle {
    font-family: 'Share Tech Mono', monospace;
    font-size: clamp(10px, 2vw, 13px);
    letter-spacing: 6px;
    color: rgba(0,245,255,0.5);
    margin-top: 10px;
    margin-bottom: 50px;
  }

  .score-display {
    font-size: clamp(28px, 5vw, 44px);
    font-weight: 700;
    color: var(--yellow);
    text-shadow: 0 0 30px var(--yellow);
    margin-bottom: 6px;
    letter-spacing: 4px;
  }
  .score-label {
    font-size: 11px;
    letter-spacing: 4px;
    color: rgba(255,221,0,0.5);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 40px;
  }
  .best-score {
    font-size: 13px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.4);
    font-family: 'Share Tech Mono', monospace;
    margin-bottom: 50px;
  }

  .btn {
    background: transparent;
    border: 2px solid var(--cyan);
    color: var(--cyan);
    font-family: 'Orbitron', monospace;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 5px;
    padding: 16px 48px;
    cursor: pointer;
    text-transform: uppercase;
    position: relative;
    overflow: hidden;
    transition: all 0.2s;
    box-shadow: 0 0 20px rgba(0,245,255,0.2), inset 0 0 20px rgba(0,245,255,0.05);
  }
  .btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--cyan);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.2s;
    z-index: -1;
  }
  .btn:hover { color: var(--bg); box-shadow: 0 0 40px rgba(0,245,255,0.5); }
  .btn:hover::before { transform: scaleX(1); }
  .btn:active { transform: scale(0.96); }

  .controls-hint {
    margin-top: 28px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: rgba(0,245,255,0.3);
    text-align: center;
    line-height: 2;
  }

  #wave-announce {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: clamp(30px, 8vw, 60px);
    font-weight: 900;
    letter-spacing: 6px;
    color: var(--yellow);
    text-shadow: 0 0 40px var(--yellow);
    z-index: 15;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
  }

  #combo-display {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 11px;
    letter-spacing: 4px;
    color: var(--yellow);
    font-family: 'Share Tech Mono', monospace;
    z-index: 5;
    opacity: 0;
    transition: opacity 0.3s;
    text-shadow: 0 0 20px var(--yellow);
  }
</style>
</head>
<body>

<canvas id="canvas"></canvas>

<div id="ui">
  <div class="stat-block">
    <span class="stat-label">SCORE</span>
    <span class="stat-value cyan" id="score-val">0</span>
  </div>
  <div class="stat-block" style="align-items:center">
    <span class="stat-label" style="text-align:center">LIVES</span>
    <div id="lives-display">
      <div class="heart" id="h1"></div>
      <div class="heart" id="h2"></div>
      <div class="heart" id="h3"></div>
    </div>
  </div>
  <div class="stat-block" style="align-items:flex-end">
    <span class="stat-label">WAVE</span>
    <span class="stat-value yellow" id="wave-val">1</span>
  </div>
</div>

<div id="wave-announce"></div>
<div id="combo-display"></div>

<div id="overlay">
  <div class="title-big" id="overlay-title">BLITZ</div>
  <div class="subtitle" id="overlay-sub">DODGE OR DIE</div>
  <div class="score-display" id="overlay-score" style="display:none">0</div>
  <div class="score-label" id="overlay-score-label" style="display:none">FINAL SCORE</div>
  <div class="best-score" id="overlay-best"></div>
  <button class="btn" id="play-btn">PLAY</button>
  <div class="controls-hint">
    WASD / ARROW KEYS / DRAG TO MOVE<br>
    SURVIVE THE WAVES — DON'T GET HIT
  </div>
</div>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

// State
let W, H, dpr;
let player, enemies, particles, bullets;
let score, lives, wave, gameActive, frameCount;
let keys = {};
let touch = null;
let animId;
let bestScore = 0;
let invincible = false, invTimer = 0;
let waveTimer = 0, waveInterval = 600; // frames
let scoreAccum = 0;
let comboCount = 0, comboTimer = 0;
let prevEnemyCount = 0;

// Elements
const scoreEl = document.getElementById('score-val');
const waveEl = document.getElementById('wave-val');
const overlay = document.getElementById('overlay');
const overlayTitle = document.getElementById('overlay-title');
const overlaySub = document.getElementById('overlay-sub');
const overlayScore = document.getElementById('overlay-score');
const overlayScoreLabel = document.getElementById('overlay-score-label');
const overlayBest = document.getElementById('overlay-best');
const playBtn = document.getElementById('play-btn');
const waveAnnounce = document.getElementById('wave-announce');
const comboDisplay = document.getElementById('combo-display');
const hearts = [document.getElementById('h1'), document.getElementById('h2'), document.getElementById('h3')];

function resize() {
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.scale(dpr, dpr);
}

function initGame() {
  score = 0;
  lives = 3;
  wave = 1;
  frameCount = 0;
  waveTimer = 0;
  scoreAccum = 0;
  comboCount = 0;
  enemies = [];
  particles = [];
  bullets = [];
  invincible = false;
  invTimer = 0;
  prevEnemyCount = 0;

  player = {
    x: W / 2, y: H / 2,
    r: 14,
    vx: 0, vy: 0,
    trail: []
  };

  updateHeartsUI();
  scoreEl.textContent = '0';
  waveEl.textContent = '1';
  gameActive = true;
  overlay.classList.add('hidden');
  spawnWave(1);
  loop();
}

function updateHeartsUI() {
  hearts.forEach((h, i) => {
    h.classList.toggle('dead', i >= lives);
  });
}

// Enemies
function spawnWave(w) {
  waveEl.textContent = w;
  showWaveAnnounce(w);

  const count = 3 + w * 2;
  for (let i = 0; i < count; i++) {
    setTimeout(() => {
      if (!gameActive) return;
      spawnEnemy(w);
    }, i * 120);
  }

  // Add homing enemies in later waves
  if (w >= 3) {
    setTimeout(() => {
      if (!gameActive) return;
      spawnHomingEnemy(w);
    }, 500);
  }
}

function randomEdge() {
  const side = Math.floor(Math.random() * 4);
  if (side === 0) return { x: Math.random() * W, y: -30 };
  if (side === 1) return { x: W + 30, y: Math.random() * H };
  if (side === 2) return { x: Math.random() * W, y: H + 30 };
  return { x: -30, y: Math.random() * H };
}

function spawnEnemy(w) {
  const pos = randomEdge();
  const speed = 1.5 + w * 0.25 + Math.random() * 1.2;
  const angle = Math.atan2(H/2 - pos.y + (Math.random()-0.5)*200, W/2 - pos.x + (Math.random()-0.5)*200);
  enemies.push({
    x: pos.x, y: pos.y,
    vx: Math.cos(angle) * speed,
    vy: Math.sin(angle) * speed,
    r: 10 + Math.random() * 8,
    type: 'normal',
    hue: Math.random() < 0.3 ? 280 : 0, // some purple, mostly red
    pulse: Math.random() * Math.PI * 2
  });
}

function spawnHomingEnemy(w) {
  const pos = randomEdge();
  enemies.push({
    x: pos.x, y: pos.y,
    vx: 0, vy: 0,
    r: 12,
    type: 'homing',
    speed: 1.8 + w * 0.15,
    hue: 30,
    pulse: 0
  });
}

function spawnSpinner(w) {
  const cx = W/2 + (Math.random()-0.5)*W*0.3;
  const cy = H/2 + (Math.random()-0.5)*H*0.3;
  const count = 6;
  const radius = 80 + Math.random()*60;
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2;
    enemies.push({
      x: cx + Math.cos(angle)*radius,
      y: cy + Math.sin(angle)*radius,
      vx: 0, vy: 0,
      r: 8,
      type: 'spinner',
      cx, cy,
      orbitAngle: angle,
      orbitRadius: radius,
      orbitSpeed: (0.02 + w * 0.003) * (Math.random() < 0.5 ? 1 : -1),
      hue: 180,
      pulse: angle
    });
  }
}

function showWaveAnnounce(w) {
  waveAnnounce.textContent = `WAVE ${w}`;
  waveAnnounce.style.opacity = '1';
  setTimeout(() => waveAnnounce.style.opacity = '0', 1200);
}

// Particles
function spawnParticles(x, y, color, count = 12) {
  for (let i = 0; i < count; i++) {
    const angle = (i / count) * Math.PI * 2 + Math.random() * 0.5;
    const speed = 2 + Math.random() * 4;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1,
      decay: 0.02 + Math.random() * 0.03,
      r: 2 + Math.random() * 3,
      color
    });
  }
}

function spawnHitParticles(x, y) {
  spawnParticles(x, y, '#ff2244', 20);
  // shockwave
  particles.push({ type: 'ring', x, y, r: 5, maxR: 60, life: 1, decay: 0.05 });
}

// Game loop
function loop() {
  if (!gameActive) return;
  animId = requestAnimationFrame(loop);
  update();
  draw();
}

function update() {
  frameCount++;

  // Player movement
  const speed = 4.5;
  const accel = 0.4;
  let targetVx = 0, targetVy = 0;

  if (keys['ArrowLeft'] || keys['a'] || keys['A']) targetVx = -speed;
  if (keys['ArrowRight'] || keys['d'] || keys['D']) targetVx = speed;
  if (keys['ArrowUp'] || keys['w'] || keys['W']) targetVy = -speed;
  if (keys['ArrowDown'] || keys['s'] || keys['S']) targetVy = speed;

  if (touch) {
    const dx = touch.x - player.x;
    const dy = touch.y - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 5) {
      targetVx = (dx / dist) * speed * Math.min(dist / 60, 1);
      targetVy = (dy / dist) * speed * Math.min(dist / 60, 1);
    }
  }

  player.vx += (targetVx - player.vx) * accel;
  player.vy += (targetVy - player.vy) * accel;
  player.x = Math.max(player.r, Math.min(W - player.r, player.x + player.vx));
  player.y = Math.max(player.r, Math.min(H - player.r, player.y + player.vy));

  // Trail
  player.trail.unshift({ x: player.x, y: player.y });
  if (player.trail.length > 18) player.trail.pop();

  // Invincibility
  if (invincible) {
    invTimer--;
    if (invTimer <= 0) invincible = false;
  }

  // Score
  scoreAccum += 0.05 + wave * 0.02;
  if (scoreAccum >= 1) {
    score += Math.floor(scoreAccum);
    scoreAccum -= Math.floor(scoreAccum);
    scoreEl.textContent = score;
  }

  // Wave progression
  waveTimer++;
  if ((prevEnemyCount > 0 && enemies.length === 0) || waveTimer >= waveInterval) {
    waveTimer = 0;
    wave++;
    waveInterval = Math.max(300, 600 - wave * 20);
    spawnWave(wave);
  }
  prevEnemyCount = enemies.length;

  // Update enemies
  enemies.forEach((e, i) => {
    if (e.type === 'homing') {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      e.vx += (dx/dist) * e.speed * 0.12;
      e.vy += (dy/dist) * e.speed * 0.12;
      const spd = Math.sqrt(e.vx*e.vx + e.vy*e.vy);
      if (spd > e.speed) { e.vx = e.vx/spd*e.speed; e.vy = e.vy/spd*e.speed; }
    } else if (e.type === 'spinner') {
      e.orbitAngle += e.orbitSpeed;
      e.x = e.cx + Math.cos(e.orbitAngle) * e.orbitRadius;
      e.y = e.cy + Math.sin(e.orbitAngle) * e.orbitRadius;
    } else {
      e.x += e.vx;
      e.y += e.vy;
    }

    e.pulse += 0.08;

    // Remove if far off screen (non-spinner)
    if (e.type !== 'spinner' && e.type !== 'homing') {
      if (e.x < -100 || e.x > W+100 || e.y < -100 || e.y > H+100) {
        enemies.splice(i, 1);
      }
    }

    // Collision
    if (!invincible) {
      const dx = player.x - e.x;
      const dy = player.y - e.y;
      const dist = Math.sqrt(dx*dx + dy*dy);
      if (dist < player.r + e.r - 4) {
        hit();
      }
    }
  });

  // Update particles
  particles.forEach((p, i) => {
    if (p.type === 'ring') {
      p.r += 3;
      p.life -= p.decay;
    } else {
      p.x += p.vx;
      p.y += p.vy;
      p.vx *= 0.94;
      p.vy *= 0.94;
      p.life -= p.decay;
    }
    if (p.life <= 0) particles.splice(i, 1);
  });

  // Combo timer
  if (comboTimer > 0) {
    comboTimer--;
    if (comboTimer === 0) {
      comboCount = 0;
      comboDisplay.style.opacity = '0';
    }
  }
}

function hit() {
  lives--;
  updateHeartsUI();
  invincible = true;
  invTimer = 120;
  spawnHitParticles(player.x, player.y);

  if (lives <= 0) {
    gameOver();
  }
}

function gameOver() {
  gameActive = false;
  cancelAnimationFrame(animId);
  if (score > bestScore) bestScore = score;

  overlayTitle.textContent = 'GAME OVER';
  overlaySub.textContent = 'YOU HAVE BEEN ELIMINATED';
  overlayScore.textContent = score;
  overlayScore.style.display = 'block';
  overlayScoreLabel.style.display = 'block';
  overlayBest.textContent = `BEST: ${bestScore}`;
  playBtn.textContent = 'RETRY';
  overlay.classList.remove('hidden');
}

// Draw
function draw() {
  ctx.clearRect(0, 0, W, H);

  // Background flash on hit
  if (invincible && invTimer > 100) {
    ctx.fillStyle = `rgba(255,34,68,${(invTimer-100)/20 * 0.15})`;
    ctx.fillRect(0, 0, W, H);
  }

  // Draw particles
  particles.forEach(p => {
    if (p.type === 'ring') {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,34,68,${p.life})`;
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
      ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2,'0');
      ctx.fill();
    }
  });

  // Player trail
  player.trail.forEach((t, i) => {
    const alpha = (1 - i/player.trail.length) * 0.3;
    const r = player.r * (1 - i/player.trail.length) * 0.8;
    ctx.beginPath();
    ctx.arc(t.x, t.y, r, 0, Math.PI*2);
    ctx.fillStyle = `rgba(0,245,255,${alpha})`;
    ctx.fill();
  });

  // Player
  if (!invincible || Math.floor(frameCount / 4) % 2 === 0) {
    // Glow
    const grd = ctx.createRadialGradient(player.x, player.y, 0, player.x, player.y, player.r * 3);
    grd.addColorStop(0, 'rgba(0,245,255,0.3)');
    grd.addColorStop(1, 'rgba(0,245,255,0)');
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r * 3, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    // Core
    ctx.beginPath();
    ctx.arc(player.x, player.y, player.r, 0, Math.PI*2);
    ctx.fillStyle = '#00f5ff';
    ctx.shadowColor = '#00f5ff';
    ctx.shadowBlur = 20;
    ctx.fill();
    ctx.shadowBlur = 0;

    // Inner dot
    ctx.beginPath();
    ctx.arc(player.x, player.y, 5, 0, Math.PI*2);
    ctx.fillStyle = '#fff';
    ctx.fill();
  }

  // Enemies
  enemies.forEach(e => {
    const pulse = Math.sin(e.pulse) * 0.15 + 1;
    const r = e.r * pulse;

    let color, glowColor;
    if (e.type === 'spinner') {
      color = '#ff00ff'; glowColor = '#ff00ff';
    } else if (e.type === 'homing') {
      color = '#ff8800'; glowColor = '#ff8800';
    } else if (e.hue === 280) {
      color = '#cc44ff'; glowColor = '#cc44ff';
    } else {
      color = '#ff2244'; glowColor = '#ff2244';
    }

    // Glow
    const grd = ctx.createRadialGradient(e.x, e.y, 0, e.x, e.y, r * 2.5);
    grd.addColorStop(0, glowColor + '44');
    grd.addColorStop(1, glowColor + '00');
    ctx.beginPath();
    ctx.arc(e.x, e.y, r * 2.5, 0, Math.PI*2);
    ctx.fillStyle = grd;
    ctx.fill();

    ctx.beginPath();
    ctx.arc(e.x, e.y, r, 0, Math.PI*2);
    ctx.fillStyle = color;
    ctx.shadowColor = glowColor;
    ctx.shadowBlur = 15;
    ctx.fill();
    ctx.shadowBlur = 0;
  });
}

// Input
document.addEventListener('keydown', e => { keys[e.key] = true; e.preventDefault(); });
document.addEventListener('keyup', e => { keys[e.key] = false; });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.touches[0];
  touch = { x: t.clientX, y: t.clientY };
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  const t = e.touches[0];
  touch = { x: t.clientX, y: t.clientY };
}, { passive: false });

canvas.addEventListener('touchend', () => { touch = null; });

canvas.addEventListener('mousemove', e => {
  if (e.buttons === 1) touch = { x: e.clientX, y: e.clientY };
});
canvas.addEventListener('mouseup', () => { touch = null; });

playBtn.addEventListener('click', () => {
  overlayScore.style.display = 'none';
  overlayScoreLabel.style.display = 'none';
  overlayTitle.textContent = 'BLITZ';
  overlaySub.textContent = 'DODGE OR DIE';
  playBtn.textContent = 'PLAY';
  initGame();
});

window.addEventListener('resize', () => {
  resize();
  if (player) { player.x = W/2; player.y = H/2; }
});

// Best score display
function updateBestDisplay() {
  if (bestScore > 0) overlayBest.textContent = `BEST: ${bestScore}`;
}

resize();
updateBestDisplay();
</script>
</body>
</html>
